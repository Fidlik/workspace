<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Studenecká Promítací Kabina | Admin</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/theme.js" defer></script>
  <script src="/admin.js" defer></script>
</head>
<body>
  <header class="shell">
    <div>
      <h1><a class="title-link" href="/">Studenecká Promítací Kabina</a></h1>
      <p class="subtitle">Trideni fronty pozadavku a zmena stavu.</p>
    </div>
    <nav>
      <a href="/tickets">Nastenka</a>
      <a href="/admin">Admin</a>
      <button id="theme-toggle" class="theme-toggle" type="button">Tmavy Rezim</button>
    </nav>
  </header>

  <main class="shell">
    <section class="panel">
      <h2>Statistiky</h2>
      <pre id="stats"></pre>
    </section>

    <section class="panel">
      <h2>Fronta</h2>
      <div class="admin-toolbar">
        <label class="admin-toggle">
          <input id="hide-completed" type="checkbox" checked />Skryt hotove
        </label>
      </div>
      <div id="admin-list"></div>
    </section>
  </main>
</body>
</html>
