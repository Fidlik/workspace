<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CineDesk Requests</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="/config.js" defer></script>
  <script src="/main.js" defer></script>
</head>
<body>
  <header class="shell">
    <div>
      <h1>CineDesk Request Box</h1>
      <p class="subtitle">Collect issues and movie or TV requests for your library.</p>
    </div>
    <nav>
      <a href="/tickets">Board</a>
      <a href="/admin">Admin</a>
    </nav>
  </header>

  <main class="shell">
    <section class="panel">
      <h2>Submit a Ticket</h2>
      <form id="ticket-form">
        <label>Type
          <select name="type" id="type" required>
            <option value="issue">Issue</option>
            <option value="movie">Movie Request</option>
            <option value="tv">TV Show Request</option>
          </select>
        </label>

        <label>Title
          <input type="text" name="title" maxlength="120" minlength="3" required />
        </label>

        <label>Description (optional)
          <textarea name="description" maxlength="2000" rows="5"></textarea>
        </label>

        <div class="meta-grid">
          <label>Year (optional)
            <input type="number" name="year" min="1888" />
          </label>

          <label>Language (optional)
            <input type="text" name="language" maxlength="40" />
          </label>
        </div>

        <div class="cf-turnstile" id="turnstile-widget"></div>

        <button type="submit">Submit Ticket</button>
      </form>
      <p id="form-message" class="message"></p>
    </section>

    <section class="panel">
      <h2>Recent Open Tickets</h2>
      <div id="recent-list"></div>
    </section>
  </main>
</body>
</html>
