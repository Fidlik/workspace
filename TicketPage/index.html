<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Studenecká Promítací Kabina | Pozadavky</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="/theme.js" defer></script>
  <script src="/config.js" defer></script>
  <script src="/main.js" defer></script>
</head>
<body>
  <header class="shell">
    <div>
      <h1><a class="title-link" href="/">Studenecká Promítací Kabina</a></h1>
      <p class="subtitle">Sbirani hlaseni problemu a pozadavku na filmy nebo serialy.</p>
    </div>
    <nav>
      <a href="/tickets">Nastenka</a>
      <a href="/admin">Admin</a>
      <button id="theme-toggle" class="theme-toggle" type="button">Tmavy Rezim</button>
    </nav>
  </header>

  <main class="shell">
    <section class="panel">
      <h2>Odeslat pozadavek</h2>
      <form id="ticket-form">
        <label>Typ
          <select name="type" id="type" required>
            <option value="issue">Problem</option>
            <option value="movie">Pozadavek na film</option>
            <option value="tv">Pozadavek na serial</option>
          </select>
        </label>

        <label>Nazev
          <input type="text" name="title" maxlength="120" minlength="3" required />
        </label>

        <label>Popis (volitelne)
          <textarea name="description" maxlength="2000" rows="5"></textarea>
        </label>

        <div class="meta-grid">
          <label>Rok (volitelne)
            <input type="number" name="year" min="1888" />
          </label>

          <label>Jazyk (volitelne)
            <input type="text" name="language" maxlength="40" />
          </label>
        </div>

        <div class="cf-turnstile" id="turnstile-widget"></div>

        <button type="submit">Odeslat</button>
      </form>
      <p id="form-message" class="message"></p>
    </section>

    <section class="panel">
      <h2>Posledni otevrene pozadavky</h2>
      <div id="recent-list"></div>
    </section>
  </main>
</body>
</html>
