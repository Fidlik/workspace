<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CineDesk | Nastenka</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/theme.js" defer></script>
  <script src="/tickets.js" defer></script>
</head>
<body>
  <header class="shell">
    <div>
      <h1>Nastenka projekce</h1>
      <p class="subtitle">Prehled nahlasenych problemu a pozadavku na obsah.</p>
    </div>
    <nav>
      <a href="/tickets">Nastenka</a>
      <a href="/admin">Admin</a>
      <button id="theme-toggle" class="theme-toggle" type="button">Tmavy Rezim</button>
    </nav>
  </header>

  <main class="shell panel">
    <h2>Prochazet pozadavky</h2>
    <form id="filters" class="filters">
      <input type="text" name="q" placeholder="Hledat podle nazvu nebo popisu" />
      <select name="type">
        <option value="">Vsechny typy</option>
        <option value="issue">Problem</option>
        <option value="movie">Film</option>
        <option value="tv">Serial</option>
      </select>
      <select name="status">
        <option value="">Vsechny stavy</option>
        <option value="new">Novy</option>
        <option value="triaged">Roztrideno</option>
        <option value="in_progress">Resi se</option>
        <option value="done">Hotovo</option>
        <option value="closed">Uzavreno</option>
        <option value="rejected">Zamitnuto</option>
      </select>
      <button type="submit">Filtrovat</button>
    </form>

    <div id="ticket-list"></div>

    <div class="pager">
      <button id="prev" type="button">Predchozi</button>
      <span id="pager-info"></span>
      <button id="next" type="button">Dalsi</button>
    </div>
  </main>
</body>
</html>
